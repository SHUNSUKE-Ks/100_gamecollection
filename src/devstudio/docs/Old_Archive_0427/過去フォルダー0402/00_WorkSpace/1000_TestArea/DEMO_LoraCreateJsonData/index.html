<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoNovel | Asset Tag Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0f111a;
            --bg-panel: rgba(30, 34, 51, 0.7);
            --bg-sidebar: #141721;
            --accent: #5e5ce6;
            --accent-glow: rgba(94, 92, 230, 0.5);
            --text-main: #e0e0e6;
            --text-dim: #9ea4b0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --tag-bg: rgba(94, 92, 230, 0.2);
            --tag-text: #bfbdff;
            --card-radius: 16px;
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        h1,
        h2,
        h3 {
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            margin: 0;
        }

        /* Sidebar */
        aside {
            width: 280px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--accent);
        }

        .nav-group {
            margin-bottom: 32px;
        }

        .nav-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            margin-bottom: 12px;
            display: block;
        }

        .folder-select-container {
            margin-bottom: 20px;
            position: relative;
        }

        .folder-select {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 10px 14px;
            border-radius: 8px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
            appearance: none;
        }

        .folder-select:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--accent);
        }

        .btn-add-img {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-add-img:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: radial-gradient(circle at top right, rgba(94, 92, 230, 0.05), transparent);
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 0 40px 40px 40px;
        }

        header {
            padding: 40px 40px 20px 40px;
            z-index: 5;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 24px;
        }

        .search-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-container {
            position: relative;
            width: 320px;
        }

        .search-container input {
            width: 100%;
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            padding: 10px 16px;
            border-radius: 20px;
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        .search-container input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .view-switcher {
            display: flex;
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 4px;
            gap: 4px;
        }

        .view-btn {
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
        }

        .view-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .view-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent);
        }

        /* Sub Section (Filters) */
        .filter-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            margin-bottom: 30px;
        }

        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .btn-all-tags {
            font-size: 0.8rem;
            color: var(--text-dim);
            cursor: pointer;
            text-decoration: underline;
        }

        .btn-all-tags:hover {
            color: white;
        }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            overflow: hidden;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .img-container {
            width: 100%;
            aspect-ratio: 1/1;
            overflow: hidden;
            background: #1a1e2e;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 16px;
        }

        .card-title {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-dim);
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .tag-chip {
            background: var(--tag-bg);
            color: var(--tag-text);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* Modal */
        #imageModal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            position: relative;
            max-width: 90vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #modalImg {
            max-width: 100%;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .modal-info {
            margin-top: 20px;
            text-align: center;
        }

        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            z-index: 1001;
        }

        .nav-arrow:hover {
            background: var(--accent);
        }

        .arrow-left {
            left: -100px;
        }

        .arrow-right {
            right: -100px;
        }

        /* Drag & Drop Overlay */
        #dropOverlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            border: 4px dashed var(--accent);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            pointer-events: none;
        }

        .overlay-text {
            background: white;
            color: var(--accent);
            padding: 20px 40px;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>

<body ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
    <div id="dropOverlay">
        <div class="overlay-text">ここに画像を追加してください</div>
    </div>

    <aside>
        <div class="logo">
            <svg width="32" height="32" viewBox="0 0 32 32">
                <rect width="32" height="32" rx="8" fill="#5e5ce6" />
                <path d="M8 12L16 8L24 12V20L16 24L8 20V12Z" stroke="white" stroke-width="2" />
            </svg>
            Asset Studio
        </div>

        <nav class="nav-group">
            <span class="nav-label">Folders</span>
            <div class="folder-select-container">
                <select class="folder-select" id="folderSelect" onchange="handleFolderChange(this.value)">
                    <option value="all">All Assets</option>
                    <option value="黒髪">黒髪 (Black Hair)</option>
                    <option value="InBox">InBox</option>
                </select>
                <button class="btn-add-img">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add Image
                </button>
            </div>
        </nav>

        <nav class="nav-group">
            <span class="nav-label">Utilities</span>
            <div class="nav-item">LoRA Export</div>
            <div class="nav-item">Settings</div>
        </nav>

        <div style="margin-top: auto; font-size: 0.7rem; color: var(--text-dim);">
            NanoNovel Asset System v1.1
        </div>
    </aside>

    <main>
        <header>
            <div class="header-top">
                <h2>Image Assets</h2>
                <div class="search-area">
                    <div class="search-container">
                        <input type="text" placeholder="Search tags or files..." oninput="handleSearch(this.value)">
                    </div>
                    <div class="view-switcher">
                        <div id="btnGallery" class="view-btn active" onclick="switchView('gallery')"
                            title="Gallery View">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <rect x="3" y="3" width="7" height="7"></rect>
                                <rect x="14" y="3" width="7" height="7"></rect>
                                <rect x="14" y="14" width="7" height="7"></rect>
                                <rect x="3" y="14" width="7" height="7"></rect>
                            </svg>
                        </div>
                        <div id="btnList" class="view-btn" onclick="switchView('list')" title="List View">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <line x1="8" y1="6" x2="21" y2="6"></line>
                                <line x1="8" y1="12" x2="21" y2="12"></line>
                                <line x1="8" y1="18" x2="21" y2="18"></line>
                                <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                <line x1="3" y1="12" x2="3.01" y2="12"></line>
                                <line x1="3" y1="18" x2="3.01" y2="18"></line>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="filter-section">
                <div class="active-filters" id="activeFilters">
                    <span class="tag-chip" style="background: rgba(255,255,255,0.1); color: white;"># All Items</span>
                </div>
                <div class="btn-all-tags"
                    onclick="console.log('--- All Tags Collection ---', Object.values(db).flat())">
                    View All Tags (Console)
                </div>
            </div>
        </header>

        <div class="content-scroll">
            <div id="galleryView" class="view-content">
                <div class="gallery-grid" id="galleryGrid"></div>
            </div>

            <div id="listView" class="view-content hidden">
                <!-- Simple Table placeholder -->
                <div id="listGrid" style="display: flex; flex-direction: column; gap: 8px;"></div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div id="imageModal" onclick="closeModal(event)">
        <div class="nav-arrow arrow-left" onclick="navigateModal(-1); event.stopPropagation();">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </div>
        <div class="modal-content" onclick="event.stopPropagation()">
            <img id="modalImg" src="">
            <div class="modal-info">
                <h3 id="modalTitle"></h3>
                <div class="tag-list" id="modalTags" style="justify-content: center; margin-top: 10px;"></div>
            </div>
        </div>
        <div class="nav-arrow arrow-right" onclick="navigateModal(1); event.stopPropagation();">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </div>
    </div>

    <script>
        let db = {};
        let currentView = 'gallery';
        let currentFilter = { folder: 'all', search: '' };
        let filteredImages = [];
        let currentIndex = 0;
        const imagesPath = 'assets/images/';

        async function init() {
            try {
                const response = await fetch('assets/tags.json');
                db = await response.json();
                updateView();
            } catch (e) {
                console.error('Failed to load assets', e);
            }
        }

        function updateView() {
            const query = currentFilter.search.toLowerCase();
            const folder = currentFilter.folder;

            filteredImages = Object.entries(db).filter(([file, tags]) => {
                const matchFolder = folder === 'all' || file.startsWith(folder + '/');
                const matchSearch = file.toLowerCase().includes(query) || tags.some(t => t.toLowerCase().includes(query));
                return matchFolder && matchSearch;
            });

            renderGallery();
            renderList();
            updateFilterChips();
        }

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            grid.innerHTML = '';
            filteredImages.forEach(([file, tags], index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(index);
                card.innerHTML = `
                    <div class="img-container">
                        <img src="${imagesPath}${file}" alt="${file}" loading="lazy" onerror="this.src='https://placehold.co/400x400/1a1e2e/e0e0e6?text=Not+Found'">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${file.split('/').pop()}</div>
                        <div class="tag-list">
                            ${tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderList() {
            const grid = document.getElementById('listGrid');
            grid.innerHTML = '';
            filteredImages.forEach(([file, tags]) => {
                const item = document.createElement('div');
                item.style = 'display: flex; align-items: center; gap: 20px; padding: 12px; background: var(--bg-panel); border-radius: 8px; border: 1px solid var(--glass-border);';
                item.innerHTML = `
                    <img src="${imagesPath}${file}" style="width: 50px; height: 50px; object-fit: cover; border-radius: 4px;">
                    <div style="flex: 1; font-size: 0.9rem;">${file}</div>
                    <div class="tag-list" style="flex: 2;">
                        ${tags.map(t => `<span class="tag-chip">${t}</span>`).join('')}
                    </div>
                `;
                grid.appendChild(item);
            });
        }

        function updateFilterChips() {
            const chipArea = document.getElementById('activeFilters');
            chipArea.innerHTML = '';
            const addChip = (txt) => {
                const chip = document.createElement('span');
                chip.className = 'tag-chip';
                chip.style = 'background: rgba(255,255,255,0.1); color: white;';
                chip.textContent = txt;
                chipArea.appendChild(chip);
            };

            if (currentFilter.folder !== 'all') addChip(`Folder: ${currentFilter.folder}`);
            if (currentFilter.search) addChip(`Search: ${currentFilter.search}`);
            if (chipArea.innerHTML === '') addChip('# All Items');
        }

        // Event Handlers
        function handleSearch(val) {
            currentFilter.search = val;
            updateView();
        }

        function handleFolderChange(val) {
            currentFilter.folder = val;
            updateView();
        }

        function switchView(view) {
            currentView = view;
            document.getElementById('galleryView').classList.toggle('hidden', view !== 'gallery');
            document.getElementById('listView').classList.toggle('hidden', view !== 'list');
            document.getElementById('btnGallery').classList.toggle('active', view === 'gallery');
            document.getElementById('btnList').classList.toggle('active', view === 'list');
        }

        // Modal Logic
        function openModal(index) {
            currentIndex = index;
            const [file, tags] = filteredImages[index];
            document.getElementById('modalImg').src = imagesPath + file;
            document.getElementById('modalTitle').textContent = file.split('/').pop();
            document.getElementById('modalTags').innerHTML = tags.map(t => `<span class="tag-chip">${t}</span>`).join('');
            document.getElementById('imageModal').style.display = 'flex';
        }

        function closeModal(e) {
            document.getElementById('imageModal').style.display = 'none';
        }

        function navigateModal(dir) {
            currentIndex = (currentIndex + dir + filteredImages.length) % filteredImages.length;
            openModal(currentIndex);
        }

        // Keyboard Navigation
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('imageModal').style.display === 'flex') {
                if (e.key === 'ArrowLeft') navigateModal(-1);
                if (e.key === 'ArrowRight') navigateModal(1);
                if (e.key === 'Escape') closeModal();
            }
        });

        // Drag & Drop
        function handleDragOver(e) {
            e.preventDefault();
            document.getElementById('dropOverlay').style.display = 'flex';
        }

        function handleDragLeave(e) {
            document.getElementById('dropOverlay').style.display = 'none';
        }

        function handleDrop(e) {
            e.preventDefault();
            document.getElementById('dropOverlay').style.display = 'none';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                alert(`${files.length}枚の画像を検出しました。実際にファイルを保存するにはバックエンドエンジンの実装が必要です。`);
            }
        }

        init();
    </script>
</body>

</html>
